services:
  mock-server:
    build: .
    ports:
      - "4010:4010"
    environment:
      - HTTP_PORT=4010
      - MANIFEST_DIR=/app/manifests
      - AI_PROTOCOL_TAG=627a6ebb765a3810c52822e84fdee95bb1ee24a4
      - MANIFEST_SYNC_URL=https://raw.githubusercontent.com/ailib-official/ai-protocol/627a6ebb765a3810c52822e84fdee95bb1ee24a4/
      - RESPONSE_DELAY=0
      - ERROR_RATE=0
    volumes:
      - ./manifests:/app/manifests
